<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cream background with iOS safe-zone rounding -->
  <rect width="512" height="512" fill="#f5f0e8" rx="80"/>

  <!-- ===== GLOBE (back layer) ===== -->
  <circle cx="195" cy="200" r="118" fill="#1a1a1a"/>

  <!-- Latitude lines -->
  <ellipse cx="195" cy="152" rx="118" ry="30"  fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.28"/>
  <ellipse cx="195" cy="200" rx="118" ry="40"  fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.28"/>
  <ellipse cx="195" cy="250" rx="98"  ry="24"  fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.28"/>
  <!-- Meridian -->
  <line x1="195" y1="82"  x2="195" y2="318" stroke="#f5f0e8" stroke-width="1.5" opacity="0.28"/>

  <!-- Africa (bold, clearly white) -->
  <path d="M 193 118
    C 207 111 230 114 238 131
    L 245 157
    C 251 180 252 208 246 234
    L 249 272
    C 251 298 243 320 228 329
    C 211 338 193 331 187 313
    C 181 295 184 271 188 254
    L 185 224
    C 179 198 176 168 193 118 Z"
    fill="#f5f0e8"/>

  <!-- Europe (small, upper-left of Africa) -->
  <path d="M 150 142
    C 157 126 180 118 188 130
    L 186 152
    C 179 168 161 170 152 160
    C 146 152 147 143 150 142 Z"
    fill="#f5f0e8"/>

  <!-- ===== OPEN BOOK (middle layer — covers lower globe) ===== -->
  <!-- Left page fill -->
  <path d="M 72 342 L 72 434 Q 72 448 88 448 L 252 453 L 252 318 L 92 333 Q 72 335 72 342 Z"
    fill="white"/>
  <!-- Left page border -->
  <path d="M 72 342 L 72 434 Q 72 448 88 448 L 252 453 L 252 318 L 92 333 Q 72 335 72 342 Z"
    fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>

  <!-- Right page fill -->
  <path d="M 440 342 L 440 434 Q 440 448 424 448 L 260 453 L 260 318 L 420 333 Q 440 335 440 342 Z"
    fill="white"/>
  <!-- Right page border -->
  <path d="M 440 342 L 440 434 Q 440 448 424 448 L 260 453 L 260 318 L 420 333 Q 440 335 440 342 Z"
    fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>

  <!-- Spine -->
  <rect x="252" y="318" width="8" height="135" fill="#1a1a1a"/>

  <!-- Page ruling lines — left page -->
  <line x1="92"  y1="350" x2="252" y2="328" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="363" x2="252" y2="341" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="376" x2="252" y2="354" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="389" x2="252" y2="367" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="402" x2="252" y2="380" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="415" x2="252" y2="393" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="92"  y1="428" x2="252" y2="406" stroke="#9a7a5a" stroke-width="1.5"/>

  <!-- Page ruling lines — right page -->
  <line x1="420" y1="350" x2="260" y2="328" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="363" x2="260" y2="341" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="376" x2="260" y2="354" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="389" x2="260" y2="367" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="402" x2="260" y2="380" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="415" x2="260" y2="393" stroke="#9a7a5a" stroke-width="1.5"/>
  <line x1="420" y1="428" x2="260" y2="406" stroke="#9a7a5a" stroke-width="1.5"/>

  <!-- Bottom binding arc -->
  <path d="M 72 446 Q 256 478 440 446"
    fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>

  <!-- ===== FOUNTAIN PEN (top layer) ===== -->
  <!-- Drawn vertically (cap top, nib bottom), then rotated 45° CW around (270,250) -->
  <!-- After rotation: cap → upper-right ≈(399,121), nib → lower-left ≈(130,390) -->
  <g transform="rotate(45, 270, 250)">
    <!-- Cap (rounded pill) -->
    <rect x="249" y="68"  width="42" height="80" rx="21" fill="#1a1a1a"/>
    <!-- Clip band (cap ↔ barrel separator) -->
    <rect x="244" y="144" width="52" height="14" rx="5" fill="#3a3a3a"/>
    <!-- Barrel -->
    <rect x="249" y="158" width="42" height="148" fill="#1a1a1a"/>
    <!-- Metallic ring 1 -->
    <rect x="244" y="268" width="52" height="11" rx="4" fill="#808080"/>
    <!-- Metallic ring 2 (slightly lighter) -->
    <rect x="244" y="283" width="52" height="11" rx="4" fill="#aaaaaa"/>
    <!-- Grip (narrower, very dark) -->
    <rect x="253" y="308" width="34" height="52" rx="5" fill="#1e1e1e"/>
    <!-- Nib housing taper -->
    <path d="M 253 360 L 287 360 L 281 402 L 259 402 Z" fill="#1a1a1a"/>
    <!-- Nib triangle -->
    <path d="M 259 402 L 281 402 L 270 450 Z" fill="#1a1a1a"/>
    <!-- Nib center slit -->
    <line x1="270" y1="416" x2="270" y2="450"
      stroke="#f5f0e8" stroke-width="2.5" opacity="0.85"/>
  </g>
</svg>
